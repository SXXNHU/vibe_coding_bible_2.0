<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 32 32"
  width="32"
  height="32"
  fill="none"
>
  <!--
  ┌─────────────────────────────────────────────────┐
  │  FAVICON — Vibe Coding                          │
  │                                                 │
  │  Symbol      : V + / combination               │
  │  Background  : #0d0d0d  (Near Black)            │
  │  Symbol color: #18E299  (Brand Green)           │
  │  Corner      : rx="7"  (adjust for roundness)  │
  │  Stroke width: 2.5 / 1.8                        │
  └─────────────────────────────────────────────────┘
  -->

  <!-- Background -->
  <rect x="0" y="0" width="32" height="32" rx="7" fill="#0d0d0d" />

  <!-- V — left arm -->
  <line
    x1="6"   y1="8"
    x2="12"  y2="22"
    stroke="#18E299"
    stroke-width="2.5"
    stroke-linecap="round"
  />

  <!-- V — right arm -->
  <line
    x1="12"  y1="22"
    x2="18"  y2="8"
    stroke="#18E299"
    stroke-width="2.5"
    stroke-linecap="round"
  />

  <!-- / — separator slash (subdued, right of V) -->
  <line
    x1="21.5" y1="9"
    x2="26.5" y2="23"
    stroke="#18E299"
    stroke-width="1.8"
    stroke-linecap="round"
    opacity="0.45"
  />
</svg>
